<svg viewBox="0 0 375 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="375" height="200" fill="#F5F5F5"/>
  
  <!-- Swipe Item Background -->
  <!-- Left actions (Archive - Green) -->
  <rect x="0" y="50" width="80" height="80" fill="#4CAF50"/>
  <!-- Archive Icon (Box with down arrow) centered -->
  <g transform="translate(40, 90)">
    <rect x="-12" y="-8" width="24" height="20" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <path d="M-6 -8 L-6 -12 L6 -12 L6 -8" fill="none" stroke="white" stroke-width="2"/>
    <path d="M0 -2 L0 6 M-4 2 L0 6 L4 2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Right actions (Delete - Red) -->
  <rect x="295" y="50" width="80" height="80" fill="#FF3B30"/>
  <!-- Delete Icon (Trash can) centered -->
  <g transform="translate(335, 90)">
    <rect x="-10" y="-6" width="20" height="24" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="-6" y2="-12" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="6" y2="-12" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-14" y1="-12" x2="14" y2="-12" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="-4" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="0" x2="4" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Animated Foreground Item -->
  <g>
    <rect x="0" y="50" width="375" height="80" fill="white" stroke="#E5E5E5" stroke-width="1">
      <animate attributeName="x" 
        values="0;-100;0;100;0" 
        dur="3s" 
        repeatCount="indefinite"
        keyTimes="0;0.2;0.5;0.8;1"
        calcMode="spline"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <circle cx="30" cy="90" r="20" fill="#E0E0E0">
      <animate attributeName="cx" 
        values="30;-70;30;130;30" 
        dur="3s" 
        repeatCount="indefinite"
        keyTimes="0;0.2;0.5;0.8;1"
        calcMode="spline"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </circle>
    <rect x="60" y="75" width="200" height="12" fill="#333" rx="2">
      <animate attributeName="x" 
        values="60;-40;60;160;60" 
        dur="3s" 
        repeatCount="indefinite"
        keyTimes="0;0.2;0.5;0.8;1"
        calcMode="spline"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
    <rect x="60" y="95" width="150" height="10" fill="#999" rx="2">
      <animate attributeName="x" 
        values="60;-40;60;160;60" 
        dur="3s" 
        repeatCount="indefinite"
        keyTimes="0;0.2;0.5;0.8;1"
        calcMode="spline"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    </rect>
  </g>
  
  <!-- Instructions -->
  <text x="187" y="180" text-anchor="middle" fill="#666" font-size="12" font-family="Arial">
    🎬 Swipe left to delete, right to archive
  </text>
</svg>
